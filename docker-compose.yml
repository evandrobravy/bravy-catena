services:
  postgres:
    image: postgres:16-alpine
    container_name: catena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catena
      POSTGRES_PASSWORD: catena
      POSTGRES_DB: catena
    ports:
      - "5436:5432"
    volumes:
      - catena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catena"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: catena-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@catena.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  catena_pgdata:
